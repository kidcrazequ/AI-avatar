      - chart
      - echarts
      - 画图
      - 画个图
      - 生成图
      - 数据展示
      - 走势
      - 变化趋势
      - 同比
      - 环比
    when: 用户需要精确数据可视化（柱状图/折线图/饼图/散点图/雷达图/热力图等），数据来源于知识库或用户提供
    priority: 2

  - name: chart-from-knowledge
    path: skills/chart-from-knowledge.md
    source: local
    overrides: shared/skills/chart-from-knowledge.md
    override_reason: 增加了空数据兜底模板、chart 代码块前置骨架、工商储 query_excel 路由、工具调用纪律
