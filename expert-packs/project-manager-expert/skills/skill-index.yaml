# Skill 路由索引 v1.0 — 项目经理（项枢）
# @author zhi.qu
# @date 2026-05-09

version: "1.0"

shared_skills:
  # ── 决策回溯（v14，shared/skills/decision-trace.md） ──
  - name: decision-trace
    path: shared/skills/decision-trace.md
    source: shared
    domain: 决策回溯
    keywords:
      - 为什么没用
      - 为什么没采用
      - 为什么不用
      - 为什么没选
      - 为什么取消
      - 为什么沿用
      - 当时为什么
      - 当时怎么定的
      - 怎么决策的
      - 决策回溯
      - 决策记录
      - 历史决策
      - 谁拍板的
      - 谁讨论过
      - 评估
      - 变更点
      - 评审
      - 输入确认清单
    when: 用户问"为什么 X 没做 Y / 当时怎么决策的"等回溯型问题，需要串联 search_knowledge + query_excel + read_tool_result 还原决策链
    priority: 1

  - name: draw-mermaid
    path: shared/skills/draw-mermaid.md
    source: shared
    domain: 计划与路线图
    keywords:
      - 甘特图
      - timeline
      - 里程碑
      - RACI
      - dependency
      - 关键路径草稿
      - mermaid gantt
    when: 排期须有任务列表与日历输入（源自 knowledge 或本会话；禁止臆造资源；先 load_skill）
    priority: 1

  - name: chart-from-knowledge
    path: shared/skills/chart-from-knowledge.md
    source: shared
    domain: 度量
    keywords:
      - 燃尽图数据
      - 工时对比
      - burndown
      - KPI
    when: 数值已取证（先 load_skill）
    priority: 2

  # ── 需求澄清（动手前的拷打；显式触发） ──
  - name: grill-against-knowledge
    path: shared/skills/grill-against-knowledge.md
    source: shared
    domain: 需求澄清
    keywords:
      - grill me
      - /grill-me
      - 拷打
      - 拷问
      - 反问我
      - 把项目问透
      - 把范围问透
      - 把工期问透
      - 项目启动 grill
      - 立项 grill
      - 工期拷打
      - 范围拷打
      - 风险拷打
      - 干系人 grill
      - 依赖梳理
      - 对照知识库 grill
      - 沉淀 ADR
      - 术语对齐
    when: 用户显式请求被反问/拷打项目要素；项枢在立项/排期/范围确认/风险评估前用本技能 grill 工期约束 / 范围 / 干系人 / 依赖 / 风险，并对照 knowledge/ 沉淀 ADR；与"不占位承诺工期"红线兼容
    priority: 1

  - name: grill-me
    path: shared/skills/grill-me.md
    source: shared
    domain: 需求澄清
    keywords:
      - grill me
      - /grill-me
      - 拷打
      - 反问我
      - 在动手前把问题问清楚
    when: 同 grill-against-knowledge 但无需 ADR / 术语对齐的轻量场景（兜底）
    priority: 2
