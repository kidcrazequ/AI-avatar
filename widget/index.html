<!--
  Soul Embed widget 开发期手动测试页

  - 启动 widget-server (desktop-app) 后，将本页通过 vite dev 打开
  - widget-server 端通过 origin 白名单允许 http://127.0.0.1:5173 / http://localhost:5173
  - 修改 src/ 下文件，热更新查看效果

  @author zhi.qu
  @date 2026-05-09
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Soul Embed Widget Dev</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 720px;
      margin: 32px auto;
      padding: 0 16px;
      color: #1f2937;
    }
    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
  </style>
</head>
<body>
  <h1>Soul Embed Widget Dev Preview</h1>
  <p>修改 <code>src/</code> 下的文件，HMR 自动刷新；<code>&lt;soul-embed&gt;</code> 元素挂在右下角。</p>
  <p>嵌入示例：</p>
  <pre><code>&lt;script src="http://localhost:3211/embed.js"&gt;&lt;/script&gt;
&lt;soul-embed embed-id="emb_dev_test"&gt;&lt;/soul-embed&gt;</code></pre>

  <soul-embed
    embed-id="emb_dev_test"
    data-server="http://localhost:3211"
  ></soul-embed>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
