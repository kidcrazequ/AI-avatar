# Skill 路由索引 v1.0 — 项目经理（项枢）
# @author zhi.qu
# @date 2026-05-09

version: "1.0"

shared_skills:
  # ── 决策回溯（v14，shared/skills/decision-trace.md） ──
  - name: decision-trace
    path: shared/skills/decision-trace.md
    source: shared
    domain: 决策回溯
    keywords:
      - 为什么没用
      - 为什么没采用
      - 为什么不用
      - 为什么没选
      - 为什么取消
      - 为什么沿用
      - 当时为什么
      - 当时怎么定的
      - 怎么决策的
      - 决策回溯
      - 决策记录
      - 历史决策
      - 谁拍板的
      - 谁讨论过
      - 评估
      - 变更点
      - 评审
      - 输入确认清单
    when: 用户问"为什么 X 没做 Y / 当时怎么决策的"等回溯型问题，需要串联 search_knowledge + query_excel + read_tool_result 还原决策链
    priority: 1

  - name: draw-mermaid
    path: shared/skills/draw-mermaid.md
    source: shared
    domain: 计划与路线图
    keywords:
      - 甘特图
      - timeline
      - 里程碑
      - RACI
      - dependency
      - 关键路径草稿
      - mermaid gantt
    when: 排期须有任务列表与日历输入（源自 knowledge 或本会话；禁止臆造资源；先 load_skill）
    priority: 1

  - name: chart-from-knowledge
    path: shared/skills/chart-from-knowledge.md
    source: shared
    domain: 度量
    keywords:
      - 燃尽图数据
      - 工时对比
      - burndown
      - KPI
    when: 数值已取证（先 load_skill）
    priority: 2
