# electron-builder 打包配置
# @author zhi.qu
# @date 2026-04-03

appId: com.soul.avatar
productName: AI分身
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - "!**/*.map"
  # 排除 Tailwind/PostCSS 的非 win32 平台 napi-rs 原生绑定（仅构建期使用，运行时不依赖）
  - "!node_modules/lightningcss-darwin-*/**"
  - "!node_modules/lightningcss-linux-*/**"
  - "!node_modules/lightningcss-freebsd-*/**"
  - "!node_modules/@tailwindcss/oxide-darwin-*/**"
  - "!node_modules/@tailwindcss/oxide-linux-*/**"
  - "!node_modules/@tailwindcss/oxide-freebsd-*/**"
  - "!node_modules/@tailwindcss/oxide-wasm32-*/**"

# 7zip-bin 的平台二进制必须 unpack 才能从子进程执行
# node-unrar-js 的 wasm 文件也需要 unpack 才能 fetch
asarUnpack:
  - "node_modules/7zip-bin/**/*"
  - "node_modules/node-unrar-js/**/*"
  # 原生模块必须 unpack；交叉编译 Windows/Linux 时 afterPack 依赖此路径替换 .node 文件
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/nodejieba/**/*"
  # ripgrep 二进制需 unpack 才能从子进程执行；交叉编译 Windows 时 afterPack 替换为 rg.exe
  - "node_modules/@vscode/ripgrep/**/*"
  # 会话 HTML 导出的离屏渲染用 file:// 引这两个 dist，必须 unpack 出 asar 才能被 <script src> 加载
  - "node_modules/echarts/dist/echarts.min.js"
  - "node_modules/mermaid/dist/mermaid.min.js"
  # #16: Excel 解析 worker 脚本，unpack 出 asar 保证 worker_threads new Worker(path) 可靠加载
  - "dist-electron/excel-parse-worker.cjs"

# 打包模板和共享知识库为只读资源（分身由用户在应用内创建，不预置）
extraResources:
  - from: ../templates
    to: templates
  - from: ../shared
    to: shared
  - from: ../expert-packs
    to: expert-packs

# ========== macOS ==========
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.productivity
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"

dmg:
  title: "${productName} ${version}"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ========== Windows ==========
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: "${productName}-${version}-win-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  # 避免路径含中文时安装脚本异常（NSIS Unicode）
  unicode: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AI分身
  # 安装结束可选运行应用（用户勾选）
  runAfterFinish: true

# ========== Linux ==========
linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build/icon.png
  category: Utility
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"

# macOS 交叉编译 Windows 时，清除 quarantine 属性防止 7zip 权限错误
afterPack: scripts/after-pack.js
afterSign: scripts/after-sign.js

# native 模块重建
npmRebuild: true
