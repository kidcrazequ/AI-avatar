name: Release builds

# 触发条件：
#   - push 形如 v* 的 tag → 自动 checkout 该 tag 构建并上传到对应 GitHub Release
#   - 手动触发（workflow_dispatch）→ checkout main 构建并上传到指定 tag 的 Release
#     （tag 历史不动；适合"基于当前 main 修补 + 重发产物"的场景）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '产物上传到哪个 release（如 v0.13.0）；代码来自当前 main HEAD'
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest    # arm64 runner，dist:mac 跑双 arch（arm64 + x64 via Rosetta cross-build）
            target: mac
            artifact_glob: '*.dmg *.dmg.blockmap'
          - os: windows-latest  # x64，原生支持 NSIS，不需要 wine
            target: win
            artifact_glob: '*.exe *.exe.blockmap'
          - os: ubuntu-latest   # x64 AppImage（默认 target）
            target: linux
            artifact_glob: '*.AppImage *.AppImage.blockmap *.deb *.snap'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      # push tag → 用 tag ref；手动触发 → 用 main（最新修补，tag 历史不动）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            desktop-app/package-lock.json
            packages/core/package-lock.json

      - name: Build @soul/core
        working-directory: packages/core
        run: npm ci && npm run build

      - name: Install desktop-app + build ${{ matrix.target }}
        working-directory: desktop-app
        run: npm ci && npm run dist:${{ matrix.target }}

      - name: Upload artifacts to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          cd desktop-app/release
          shopt -s nullglob
          files=()
          for pattern in ${{ matrix.artifact_glob }}; do
            for f in $pattern; do
              files+=("$f")
            done
          done
          # electron-builder 的 auto-updater manifest
          for f in latest*.yml; do
            files+=("$f")
          done
          if [ ${#files[@]} -eq 0 ]; then
            echo "没找到任何 ${{ matrix.target }} 产物 — 上传步骤跳过"
            ls -la
            exit 1
          fi
          echo "Uploading ${#files[@]} files to release $TAG:"
          printf '  %s\n' "${files[@]}"
          gh release upload "$TAG" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
