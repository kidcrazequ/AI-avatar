      - 交互图
      - 关系图
      - 全景图
      - 项目计划
      - 时间表
      - 排期
      - 里程碑
      - gantt
      - flowchart
      - mermaid
      - 脑图
      - 序列图
      - 泳道图
      - 状态流转
