# Skill 路由索引 v1.0 — 总控调度员（调枢）
#
# 路径约定：
#   source: shared → path 相对仓库根目录
#   source: local  → path 相对本分身目录
#
# 调枢不做领域工作，因此不挂任何领域 skill；
# 跨分身派发由内置的 `task` 工具直接承担，无需额外 skill。

version: "1.0"

shared_skills:
  - name: agent-reach
    path: shared/skills/agent-reach.md
    source: shared
    domain: 互联网检索
    keywords:
      - 全网调研
      - 联网搜索
      - 搜索
      - 查一下
      - 找资料
      - research
      - 链接
      - 网页
      - URL
      - GitHub
      - YouTube
      - B站
      - V2EX
      - RSS
      - Twitter
      - 推特
      - Reddit
      - 小红书
      - 雪球
      - LinkedIn
      - 小宇宙
      - 播客
      - 字幕
    when: 用户需要联网调研、读取 URL、搜索网页、查看 GitHub/YouTube/B站/V2EX/RSS 或社交社区平台内容时，使用 Agent Reach 选择可用后端并获取资料
    priority: 1
local_skills: []
