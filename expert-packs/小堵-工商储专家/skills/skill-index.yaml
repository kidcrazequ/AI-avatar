      - 折线图
      - 饼图
      - 散点图
      - 雷达图
      - 热力图
      - 桑基图
      - 趋势图
      - 数据图
      - 图表
      - 可视化
      - 对比图
      - 占比
      - 分布
      - 统计
      - 效率
      - 折线
      - 柱状
      - 环形图
