# 公共技能索引 v1.0
#
# 本文件登记所有跨分身共享的技能。
# 各分身的 skills/skill-index.yaml 通过 path 字段引用本目录下的 .md 文件。
#
# ┌─────────────────────────────────────────────────────────┐
# │ 三级技能体系                                             │
# ├──────────┬──────────────────────────────────────────────┤
# │ source   │ 路径约定（相对项目根目录）                     │
# ├──────────┼──────────────────────────────────────────────┤
# │ local    │ avatars/<id>/skills/<name>.md                │
# │ shared   │ shared/skills/<name>.md                      │
# │ community│ shared/skills/community/<pkg>/skills/<name>.md│
# └──────────┴──────────────────────────────────────────────┘
#
# 优先级（同名冲突时）：local > shared > community
#
# 分身索引引用示例：
#   - name: draw-chart
#     path: shared/skills/draw-chart.md           # ← 自有公共技能
#     source: shared
#
#   - name: query-product-quality
#     path: skills/query-product-quality.md        # ← 分身专属技能
#     source: local
#
#   - name: prompt-engineering
#     path: shared/skills/community/awesome-prompt/skills/prompt-engineering.md
#     source: community                            # ← GitHub 开源技能
#     origin: https://github.com/example/awesome-prompt-skills.git@v1.0.0

version: "1.0"

skills:
  # ═══════════════════════════════════════
  # 数据可视化
  # ═══════════════════════════════════════
  - name: draw-chart
    path: shared/skills/draw-chart.md
    domain: 数据可视化
    keywords:
      - 柱状图
      - 折线图
      - 饼图
      - 散点图
      - 雷达图
      - 热力图
      - 桑基图
      - 趋势图
      - 数据图
      - 图表
      - 可视化
      - 对比图
      - 占比
      - 分布
      - 统计
      - 效率
      - 折线
      - 柱状
      - 环形图
      - K线
      - chart
      - echarts
      - 画图
      - 画个图
      - 生成图
      - 数据展示
      - 走势
      - 变化趋势
      - 同比
      - 环比
    when: 用户需要精确数据可视化（柱状图/折线图/饼图/散点图/雷达图/热力图等），数据来源于知识库或用户提供
    priority: 1

  - name: chart-from-knowledge
    path: shared/skills/chart-from-knowledge.md
    domain: 数据可视化
    keywords:
      - 知识库画图
      - 基于数据画
      - 从表格画
      - 用数据生成
      - Excel画图
      - 表格可视化
    when: 用户需要基于知识库已有数据画图，需要先检索再画图的两步链式调用
    priority: 2

