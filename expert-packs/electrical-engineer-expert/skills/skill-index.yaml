# Skill 路由索引 v1.0 — 电气工程师（电图）
#
# @author zhi.qu
# @date 2026-05-09

version: "1.0"

shared_skills:
  # ── 决策回溯（v14，shared/skills/decision-trace.md） ──
  - name: decision-trace
    path: shared/skills/decision-trace.md
    source: shared
    domain: 决策回溯
    keywords:
      - 为什么没用
      - 为什么没采用
      - 为什么不用
      - 为什么没选
      - 为什么取消
      - 为什么沿用
      - 当时为什么
      - 当时怎么定的
      - 怎么决策的
      - 决策回溯
      - 决策记录
      - 历史决策
      - 谁拍板的
      - 谁讨论过
      - 评估
      - 变更点
      - 评审
      - 输入确认清单
    when: 用户问"为什么 X 没做 Y / 当时怎么决策的"等回溯型问题，需要串联 search_knowledge + query_excel + read_tool_result 还原决策链
    priority: 1

  # 拓扑 / 单线图 / 供配电关系示意（先于口头描述）
  - name: draw-mermaid
    path: shared/skills/draw-mermaid.md
    source: shared
    domain: 结构可视化
    keywords:
      - 单线图
      - 一次系统
      - 配电
      - 拓扑
      - 接线关系
      - 甘特
      - 验收流程
      - mermaid
    when: 需要结构化表达系统拓扑、工序或验收流转时（先 load_skill）
    priority: 1

  - name: chart-from-knowledge
    path: shared/skills/chart-from-knowledge.md
    source: shared
    domain: 数据可视化
    keywords:
      - 负载曲线
      - 趋势
      - 用电量
      - 实测对比
      - 图表
    when: 基于知识库或台账数值输出 ECharts 时（先 load_skill）
    priority: 2

  - name: draw-chart
    path: shared/skills/draw-chart.md
    source: shared
    domain: 数据可视化
    keywords:
      - 谐波
      - 柱状图
      - 折线图
      - 波形数据
      - chart
    when: 多组精确数值需制图对比时（先 load_skill）
    priority: 3

  - name: agent-reach
    path: shared/skills/agent-reach.md
    source: shared
    domain: 互联网检索
    keywords:
      - 全网调研
      - 联网搜索
      - 搜索
      - 查一下
      - 找资料
      - research
      - 链接
      - 网页
      - URL
      - GitHub
      - YouTube
      - B站
      - V2EX
      - RSS
      - Twitter
      - 推特
      - Reddit
      - 小红书
      - 雪球
      - LinkedIn
      - 小宇宙
      - 播客
      - 字幕
    when: 用户需要联网调研、读取 URL、搜索网页、查看 GitHub/YouTube/B站/V2EX/RSS 或社交社区平台内容时，使用 Agent Reach 选择可用后端并获取资料
    priority: 1
