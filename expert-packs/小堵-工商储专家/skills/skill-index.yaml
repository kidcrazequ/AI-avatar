# Skill 路由索引 v1.0 — 小堵·工商储专家
#
# 三层架构：
#   Layer 1 (本文件): 索引层 — name / keywords / when / priority
#   Layer 2 (SkillRouter): 路由层 — 意图提取 → grep 召回 → 冲突裁决
#   Layer 3 (执行层): 加载选中 skill 的完整 SKILL.md → 注入对话
#
# 路径约定：
#   - source: shared → path 相对项目根目录（shared/skills/xxx.md）
#   - source: local  → path 相对分身目录（skills/xxx.md）
#   - 当 local 和 shared 有同名技能时，local 版本为本分身的领域增强覆写
#
# keywords 在打包阶段由 LLM 扩充到 30-50 个，覆盖口语/简称/行业黑话/同义词。
# 运行时 grep 匹配，不依赖 LLM。
#
# priority: 数字越小优先级越高。同分时按 keywords 命中数排序。

version: "1.0"

# ═══════════════════════════════════════
# 本地专属技能（仅工商储分身使用）
# ═══════════════════════════════════════
local_skills:
  - name: query-product-quality
    path: skills/query-product-quality.md
    source: local
    domain: 产品质量数据查询
    keywords:
      - 产品质量
      - 质量指标
      - 设备侧效率
      - 系统效率
      - 故障率
      - 机型
      - 215机型
      - 372机型
      - 工商储
      - dashboard
      - 统计周期
      - 指标折线
      - 指标趋势
      - 质量趋势
      - 质量折线
      - 质量柱状
      - 质量数据
      - 月度指标
      - 年度指标
      - KPI查询
      - 指标对比
      - 项目效率
      - 月份效率
    when: 用户询问工商储产品质量 KPI（机型/项目/统计周期/设备侧效率/系统效率/故障率等），需要查询 Excel 质量数据看板再画图
    priority: 0

  - name: decision-trace
    path: skills/decision-trace.md
    source: local
    domain: 决策回溯
    keywords:
      - 为什么没用
      - 为什么没采用
      - 为什么不用
      - 为什么没选
      - 为什么沿用
      - 为什么取消
      - 为什么改成
      - 决策回溯
      - 当时为什么
      - 当时怎么定的
      - 怎么决策的
      - 怎么定的
      - 谁拍板的
      - 谁讨论过
      - 谁定的
      - 选了 X 而不是 Y
      - 用了 X 没用 Y
      - 决策记录
      - 评估
      - 评审
      - 变更点
      - 输入确认清单
      - 项目决策
      - 历史决策
      - 当时的考虑
      - 当时的方案
      - ODM2.0
      - L05Pack
      - 1P52S
      - 1P104S
    when: 用户问"为什么 X 没做 Y / 为什么没用 Z / 当时怎么决策的"等回溯型问题，需要串联 search_knowledge + query_excel + read_tool_result 还原决策链
    priority: 0

# ═══════════════════════════════════════
# 本地覆写技能（基于公共版本的领域增强）
# ═══════════════════════════════════════
local_overrides:
