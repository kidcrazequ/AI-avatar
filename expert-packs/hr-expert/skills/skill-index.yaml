# Skill 路由索引 v1.0 — HR（人研）
# @author zhi.qu
# @date 2026-05-09

version: "1.0"

shared_skills:
  # ── 决策回溯（v14，shared/skills/decision-trace.md） ──
  - name: decision-trace
    path: shared/skills/decision-trace.md
    source: shared
    domain: 决策回溯
    keywords:
      - 为什么没用
      - 为什么没采用
      - 为什么不用
      - 为什么没选
      - 为什么取消
      - 为什么沿用
      - 当时为什么
      - 当时怎么定的
      - 怎么决策的
      - 决策回溯
      - 决策记录
      - 历史决策
      - 谁拍板的
      - 谁讨论过
      - 评估
      - 变更点
      - 评审
      - 输入确认清单
    when: 用户问"为什么 X 没做 Y / 当时怎么决策的"等回溯型问题，需要串联 search_knowledge + query_excel + read_tool_result 还原决策链
    priority: 1

  - name: draw-mermaid
    path: shared/skills/draw-mermaid.md
    source: shared
    domain: 流程与制度可视化
    keywords:
      - 入职流程
      - 离职交接
      - 绩效校准
      - 招聘漏斗
      - 组织架构调整沟通
      - mermaid
    when: HR 流程图 / 日历排期可视化（材料须来自 knowledge/；先 load_skill）
    priority: 1

  - name: chart-from-knowledge
    path: shared/skills/chart-from-knowledge.md
    source: shared
    domain: 统计分析
    keywords:
      - Offer 漏斗
      - 编制对比
      - 离职率台账
      - KPI
      - HR 指标
    when: 表中数字已入库或可 query 时画图（先 load_skill）
    priority: 2
